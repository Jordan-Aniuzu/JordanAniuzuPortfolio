<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
</head>
<body>
    <h1>Timeline</h1>

    <form id="postForm">
        <input type="text" id="name" placeholder="Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <textarea id="content" placeholder="What's on your mind?" required></textarea>
        <button type="submit">Post</button>
    </form>

    <div id="posts"></div>

    <script>
        const form = document.getElementById('postForm');
        const postsDiv = document.getElementById('posts');

        async function loadPosts() {
            const res = await fetch('/api/timeline_post');
            const data = await res.json();
            postsDiv.innerHTML = data.timeline_posts.map(p => `
                <div class="post">
                    <strong>${p.name}</strong> — ${new Date(p.created_at).toLocaleString()}
                    <p>${p.content}</p>
                </div>
            `).join('');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new URLSearchParams();
            formData.append('name', document.getElementById('name').value);
            formData.append('email', document.getElementById('email').value);
            formData.append('content', document.getElementById('content').value);

            await fetch('/api/timeline_post', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });

            form.reset();
            loadPosts();
        });

        loadPosts();
    </script>
</body>
</html>
